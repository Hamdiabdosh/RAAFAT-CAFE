services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: cafeos
      POSTGRES_PASSWORD: cafeos
      POSTGRES_DB: cafeos
    volumes:
      - cafeos_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafeos -d cafeos"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cafeos_pg_data:
